<!DOCTYPE html>
<html>
<head>
    <title>Redeem</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 40px;
            margin: 50px auto;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .message {
            font-size: 28px;
            font-weight: bold;
            color: #e53935;
            margin-bottom: 20px;
        }

        .sub {
            font-size: 16px;
            color: #555;
        }

        button {
            padding: 12px 20px;
            background: orange;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="message">
        {{ message }}
    </div>

    <div class="sub">
        Make sure this is applied on the till
    </div>

    <a href="/scan">
        <button>Back to Scan</button>
    </a>

</div>

</body>
</html>
