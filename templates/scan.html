<!DOCTYPE html>
<html>
<head>
    <title>Scan Customer</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 40px auto;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            background: orange;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .fish {
            background: #e3f2fd;
        }

        .other {
            background: #fff3cd;
        }

        .excluded {
            background: #f1f1f1;
        }

        .field-label {
            display: block;
            width: 80%;
            margin: 10px auto 0 auto;
            text-align: left;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Scan Customer</h2>

    <form method="POST">
        <input type="text" name="customer_id" placeholder="Scan QR code" autofocus>
        <br>
        <button type="submit">Load Customer</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

</div>

{% if customer %}
<div class="card">

    <h3>{{ customer[1] }} {{ customer[2] }}</h3>
    <p><strong>Points:</strong> {{ customer[3] }}</p>

    <form method="POST" action="/addpoints">

        <input type="hidden" name="customer_id" value="{{ customer_id }}">

        <label class="field-label" for="fish_amount">Fish £ (double points)</label>
        <input type="number" step="0.01" min="0" name="fish_amount" id="fish_amount" class="fish" placeholder="Fish £ (double points)" value="0">

        <label class="field-label" for="other_amount">Other eligible £</label>
        <input type="number" step="0.01" min="0" name="other_amount" id="other_amount" class="other" placeholder="Other eligible £" value="0">

        <label class="field-label" for="excluded_amount">Excluded £</label>
        <input type="number" step="0.01" min="0" name="excluded_amount" id="excluded_amount" class="excluded" placeholder="Excluded £" value="0">

        <br>

        <button type="submit">Add Points</button>

    </form>

</div>
{% endif %}

</body>
</html>
