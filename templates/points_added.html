<!DOCTYPE html>
<html>
<head>
    <title>Transaction Complete</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e1e;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
        }

        .card {
            background: #2c2c2c;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .big {
            font-size: 28px;
            font-weight: bold;
        }

        .points {
            font-size: 22px;
            margin: 10px 0;
        }

        .reward {
            background: #1b5e20;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        button {
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 120px;
        }

        .btn-green {
            background: #4caf50;
            color: white;
        }

        .btn-orange {
            background: orange;
            color: white;
        }

        .btn-red {
            background: #e53935;
            color: white;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            background: #263238;
            border-radius: 8px;
        }
    </style>

    <script>
    {% if earned_today == 0 %}
        setTimeout(function() {
            window.location.href = "/scan";
        }, 2000);
    {% endif %}
</script>

</head>

<body>

<div class="container">

    <!-- CUSTOMER INFO -->
    <div class="card">
        <h2>{{ forename }} {{ surname }}</h2>
        <p>ID: {{ customer_id }}</p>
    </div>

    <!-- POINTS -->
    <div class="card">
        <div class="points">Points added: +{{ points_added }}</div>
        <div class="big">Total: {{ new_points }}</div>
    </div>

    <!-- MESSAGE -->
    {% if message %}
    <div class="message">
        {{ message }}
    </div>
    {% endif %}

    <!-- REWARD SECTION -->
    <!-- REWARD INFO ONLY -->
{% if earned_today > 0 %}
<div class="card reward">
    <div class="big">£{{ earned_today }} earned today</div>
    <p>You now have £{{ total_rewards }} in rewards</p>
</div>
{% endif %}

</div>
<br><br>

<a href="/scan">
    <button style="background:#2196f3;">
        Scan Next Customer
    </button>
</a>

<a href="/history/{{ customer_id }}">
    <button style="background:#4caf50;">
        View History
    </button>
</a>
</body>
</html>
