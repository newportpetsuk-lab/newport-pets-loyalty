<!DOCTYPE html>
<html>
<head>
<title>Send Promotion</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.container {
    background: white;
    width: 400px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 10px;
}

input, textarea {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 95%;
    background: #ff7a00;
    color: white;
    border: none;
}

.preview-box {
    background: #fafafa;
    padding: 15px;
    margin-top: 15px;
    text-align: left;
    border: 1px solid #ddd;
}

.success {
    color: green;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Send Promotion</h2>

<form method="POST">

<input name="subject" placeholder="Email subject" value="{{ subject }}" required>

<textarea name="message" rows="6" placeholder="Write your message here..." required>{{ message }}</textarea>

<button type="submit" name="action" value="preview">Preview</button>

{% if preview %}
<div class="preview-box">
    <strong>Preview:</strong>
    <pre>{{ preview }}</pre>
</div>

<button type="submit" name="action" value="send">Confirm & Send</button>
{% endif %}

</form>

{% if message_sent %}
<p class="success">{{ message_sent }}</p>
{% endif %}

</div>

</body>
</html>
