<!DOCTYPE html>
<html>

<head>

<title>Customer Lookup - Newport Pets Rewards</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.container{
background:white;
width:400px;
margin:60px auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h1{
color:#ff7a00;
}

button{
background:#ff7a00;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e86800;
}

.result-box{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

input{
width:100%;
padding:10px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Newport Pets Rewards</h1>

<h3>Find Customer</h3>

<form method="POST">
    <input name="query" placeholder="Enter phone or name" autofocus>
    <button type="submit">Search</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if results %}

<h3>Results</h3>

{% for c in results %}

<div class="result-box">

    <strong>{{ c[1] }} {{ c[2] }}</strong><br>
    Phone: {{ c[3] }}<br>
    Points: {{ c[4] }}

    <form method="POST" action="/scan">
        <input type="hidden" name="customer_id" value="NP{{ "%05d"|format(c[0]) }}">
        <button>Select Customer</button>
    </form>

</div>

{% endfor %}

{% endif %}

<br>

<a href="/scan">
    <button style="background:#2196f3;">
        Back to Scan
    </button>
</a>

</div>

</body>

</html>
