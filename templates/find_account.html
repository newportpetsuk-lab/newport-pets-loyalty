<!DOCTYPE html>
<html>
<head>
<title>Find Your Account</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.container {
    background: white;
    width: 350px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 95%;
    background: #ff7a00;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Find your loyalty account</h2>

<form method="POST">
    <input name="phone" placeholder="Enter your phone number" required>
    <button type="submit">Find account</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if customer %}
<h3>Hello {{ customer[0] }}</h3>
<p>Points: {{ customer[3] }}</p>

<a href="/customer/{{ customer[2] }}">
    <button>Open your account</button>
</a>
{% endif %}

</div>

</body>
</html>
